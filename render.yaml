services:
  - type: web
    name: effiflo-dev-profile-unifier
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn src.api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: STACK_EXCHANGE_KEY
        sync: false
      - key: DEVTO_API_KEY
        sync: false
